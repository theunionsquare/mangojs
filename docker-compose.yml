services:
  mangojs-website:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-mangojs-website}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mangojs-website
    ports:
      - "${PORT:-8010}:8010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8010"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
