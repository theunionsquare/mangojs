services:
  mangojs-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mangojs-web
    ports:
      - "${PORT:-8010}:8010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8010"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
