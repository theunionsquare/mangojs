<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MangoJS Documentation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }
    .latest-btn {
      display: block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .latest-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    .latest-btn span {
      opacity: 0.8;
      font-weight: normal;
      font-size: 0.9rem;
    }
    h2 {
      font-size: 1rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .versions-list {
      list-style: none;
    }
    .versions-list li {
      margin-bottom: 8px;
    }
    .versions-list a {
      display: block;
      padding: 12px 16px;
      background: #f5f5f5;
      border-radius: 6px;
      color: #333;
      text-decoration: none;
      transition: background 0.2s;
    }
    .versions-list a:hover {
      background: #e8e8e8;
    }
    .footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eee;
      text-align: center;
    }
    .footer a {
      color: #667eea;
      text-decoration: none;
      margin: 0 12px;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MangoJS</h1>
    <p class="subtitle">API Documentation</p>

    <a href="./latest/index.html" class="latest-btn">
      View Latest Documentation <span>(v0.0.1)</span>
    </a>

    <h2>All Versions</h2>
    <ul class="versions-list">
      <li><a href="./0.0.1/index.html">v0.0.1</a></li>
    </ul>

    <div class="footer">
      <a href="https://github.com/theunionsquare/mangojs">GitHub</a>
      <a href="https://www.npmjs.com/package/@theunionsquare/mangojs-core">NPM</a>
    </div>
  </div>
</body>
</html>
